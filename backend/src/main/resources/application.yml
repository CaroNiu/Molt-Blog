server:
  port: 8080

spring:
  application:
    name: molt-blog
  
  datasource:
    url: jdbc:h2:file:./data/blog
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  h2:
    console:
      enabled: true
      path: /h2-console

jwt:
  secret: molt-blog-jwt-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000

# CORS 配置
cors:
  allowed-origins: http://localhost:3000,http://localhost:5173